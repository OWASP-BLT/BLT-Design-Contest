name: BLT Meme Submission
description: Submit your meme video entry for the BLT Meme contest
title: "[Meme] "
labels: ["meme-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎬 BLT Meme Contest Submission
        Thank you for submitting your meme video for OWASP BLT.
        Please fill out all fields below.
        Your submission will appear on the [Design Showcase](https://owasp-blt.github.io/BLT-Design-Contest/) once approved.

  - type: textarea
    id: preview_image
    attributes:
      label: Preview Image
      description: >
        Upload a preview thumbnail, screenshot, or GIF from your meme video by
        dragging and dropping it here, pasting it, or clicking the attachment button.
        GitHub will host the uploaded media automatically.
      placeholder: "Drag & drop or paste your preview here…"
    validations:
      required: true

  - type: input
    id: design_url
    attributes:
      label: Meme Video Link
      description: >
        Link to your meme video (YouTube, Loom, Drive, or other public link).
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Design Category
      options:
        - Banner / Marketing
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Describe your meme concept and how it represents OWASP BLT.
      placeholder: "My meme video shows..."
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Agreement
      description: >
        Please confirm the following before submitting.
      options:
        - label: >
            I confirm this is my original work and I grant OWASP BLT
            permission to display and use it on the showcase and in the project.
          required: true
