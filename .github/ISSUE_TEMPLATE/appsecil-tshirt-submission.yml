name: AppSecIL T-Shirt Submission
description: Submit your T-shirt design entry for the AppSecIL 2026 T-Shirt Design Contest
title: "[AppSecIL] "
labels: ["appsecil-tshirt-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👕 AppSecIL 2026 T-Shirt Design Contest Submission
        Thank you for submitting your T-shirt design for OWASP AppSec Israel 2026!
        Please fill out all fields below.
        Your submission will appear on the [Design Showcase](https://owasp-blt.github.io/BLT-Design-Contest/appsecil-tshirt.html) once approved.

        > **Alternative submission:** You can also submit directly via the [official Google Form](https://docs.google.com/forms/d/e/1FAIpQLSej8eFeNBeUhOyKmDffvv9y0QLIoWCgt6szrFVZjxDaY-8VOw/viewform).

  - type: textarea
    id: preview_image
    attributes:
      label: Preview Image
      description: >
        Upload your T-shirt design preview image by dragging and dropping it here,
        pasting it, or clicking the attachment button below.
        GitHub will host the image automatically.
      placeholder: "Drag & drop or paste your image here…"
    validations:
      required: true

  - type: input
    id: design_url
    attributes:
      label: Design / Source File Link
      description: Link to your Figma file, vector source file, or hosted design
      placeholder: "https://www.figma.com/file/..."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Describe your T-shirt design: the concept, colours, and how it represents
        the spirit of OWASP AppSec Israel and the application security community.
      placeholder: "My design uses…"
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Submission Agreement
      description: >
        Show your support for this design by reacting with a 👍 thumbs up!
      options:
        - label: >
            I confirm this is my original work and I grant OWASP BLT and OWASP AppSec Israel
            permission to display and use it on the showcase and at the conference.
          required: true
